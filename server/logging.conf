[loggers]
keys = root, pretty

[handlers]
keys = consoleHandler

[formatters]
keys = simpleFormatter

[logger_root]
level = DEBUG
handlers = consoleHandler

[logger_pretty]
level = DEBUG
handlers = consoleHandler
qualname = pretty
propagate = 0

[handler_consoleHandler]
class = StreamHandler


level = DEBUG
formatter = simpleFormatter
args = (sys.stdout,)

[formatter_simpleFormatter]
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt =
